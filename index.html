<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 聊天助手</title>
<script>
(function() {
  try {
    var theme = localStorage.getItem('ai_chat_theme');
    if (theme !== 'dark' && theme !== 'light') {
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  } catch (_) {}
})();
</script>
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/chat.css">
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
</head>
<body>

<header>
  <button class="mobile-menu-btn" onclick="toggleMobilePanel('history')" title="对话历史" aria-label="对话历史">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>
  <h1>AI 聊天</h1>
  <div class="header-center">
    <span class="conversation-title" id="convTitle" onclick="renameConversation()">新对话</span>
  </div>
  <div class="header-actions">
    <button class="theme-toggle" onclick="toggleTheme()" title="切换暗色模式" id="themeBtn">🌙</button>
    <button class="mobile-settings-btn" onclick="toggleMobilePanel('settings')" title="设置" aria-label="设置">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
    </button>
    <div class="header-dropdown">
      <button class="dropdown-trigger" onclick="toggleDropdown()" title="更多">···</button>
      <div class="dropdown-menu hidden" id="headerDropdown">
        <button onclick="showExportDialog();closeDropdown()">导出数据</button>
        <button onclick="showImportDialog();closeDropdown()">导入数据</button>
        <button onclick="showShareDialog();closeDropdown()">分享配置</button>
      </div>
    </div>
  </div>
</header>

<div class="app-container">
  <!-- History Sidebar (left) -->
  <aside class="history-sidebar">
    <div class="history-header">
      <h3>对话历史</h3>
      <button class="btn-outline btn-sm" onclick="clearAllConversations()">清空全部</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">暂无对话记录<br>发送消息后自动创建</div>
    </div>
    <div class="history-footer">共 <span id="convCount">0</span> 个对话</div>
  </aside>

  <!-- Chat -->
  <main class="chat-area">
    <div class="messages" id="messageContainer">
      <div class="empty-state" id="emptyState">
        <div class="icon">
          <svg viewBox="0 0 24 24" width="48" height="48" fill="#bbb"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </div>
        <h3>开始对话</h3>
        <p>在右侧配置 API 信息，输入问题并发送。</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-options">
        <label class="input-toggle" title="深度思考：开启后模型会先进行推理再输出答案">
          <input type="checkbox" id="reasoningToggle" onchange="saveConfigSilent()">
          <span class="input-toggle-track"></span>
          <span class="input-toggle-label">深度思考</span>
        </label>
        <label class="input-toggle" id="searchToggle" title="联网搜索：开启后 AI 可搜索互联网获取最新信息">
          <input type="checkbox" id="webSearchToggle" onchange="toggleWebSearch()">
          <span class="input-toggle-track"></span>
          <span class="input-toggle-label">🌐 搜索</span>
        </label>
        <span class="editing-indicator hidden" id="editingIndicator">
          <span class="editing-badge">编辑中</span>
          <button class="editing-cancel" onclick="cancelEdit()" title="取消编辑">✕</button>
        </span>
        <label class="upload-icon-btn" id="uploadLabel" title="上传文件或图片">
          <input type="file" id="fileInput" multiple accept=".txt,.md,.csv,.json,.xml,.js,.py,.html,.css,.yaml,.yml,.toml,.docx,image/*" hidden>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
        </label>
      </div>
      <div class="file-preview-strip" id="filePreviewStrip"></div>
      <button class="input-newchat-btn" onclick="newConversation()" title="新建对话">+</button>
      <textarea id="userInput" rows="1" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)" disabled
                onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()" disabled title="发送 (Enter)">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button id="stopBtn" class="stop-btn hidden" onclick="stopStream()" title="停止生成">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
      </button>
    </div>
  </main>

  <!-- Settings Sidebar (right) -->
  <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="折叠侧栏" id="sidebarToggleBtn">◀</button>
  <aside class="sidebar" id="settingsSidebar">
    <div class="side-tabs">
      <button class="active" onclick="switchSideTab('api')" id="tabApi">服务</button>
      <button onclick="switchSideTab('params')" id="tabParams">参数</button>
      <button onclick="switchSideTab('prompts')" id="tabPrompts">预设</button>
      <button onclick="switchSideTab('search')" id="tabSearch">搜索</button>
      <button onclick="switchSideTab('format')" id="tabFormat">格式</button>
    </div>

    <div class="side-panel" id="panelApi">
      <!-- Hidden fields for backward compatibility — synced from active API config -->
      <input type="hidden" id="apiUrl">
      <input type="hidden" id="apiKey">
      <input type="hidden" id="model">

      <!-- API Config Management -->
      <div class="api-config-header">
        <button class="btn-primary btn-sm" onclick="showApiConfigDialog()">+ 新增服务</button>
      </div>
      <div class="api-config-search">
        <input type="text" id="apiConfigSearch" placeholder="搜索服务…" oninput="renderApiConfigs()">
      </div>
      <div class="api-config-list" id="apiConfigList">
        <div class="api-config-loading">加载中…</div>
      </div>

      <div class="connection-status">
        <span class="status-dot offline" id="statusDot"></span>
        <span id="statusText">未连接</span>
        <button class="btn-outline btn-sm ml-auto" id="testBtn" onclick="testConnection()">测试连接</button>
      </div>
    </div>

    <div class="side-panel hidden" id="panelParams">
      <div class="form-group">
        <label for="systemPrompt">当前系统提示词</label>
        <textarea id="systemPrompt" rows="3" placeholder="你是一个有用的助手">你是一个有用的助手</textarea>
      </div>

      <div class="form-group">
        <label for="temperature">温度: <span id="tempValue">0.7</span></label>
        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7"
               oninput="$('tempValue').textContent=this.value">
      </div>

      <div class="form-group">
        <label for="maxTokens">最大 Token <span class="hint">(0=不限制)</span></label>
        <input type="number" id="maxTokens" placeholder="0" value="0" min="0" max="131072">
      </div>

      <div class="form-group">
        <label for="topP">Top-P: <span id="topPValue">1.0</span></label>
        <input type="range" id="topP" min="0" max="1" step="0.05" value="1"
               oninput="$('topPValue').textContent=parseFloat(this.value).toFixed(2)">
      </div>

      <div class="form-group">
        <label for="frequencyPenalty">频率惩罚: <span id="freqPValue">0</span></label>
        <input type="range" id="frequencyPenalty" min="-2" max="2" step="0.1" value="0"
               oninput="$('freqPValue').textContent=this.value">
      </div>

      <div class="form-group">
        <label for="presencePenalty">存在惩罚: <span id="presPValue">0</span></label>
        <input type="range" id="presencePenalty" min="-2" max="2" step="0.1" value="0"
               oninput="$('presPValue').textContent=this.value">
      </div>

      <div class="form-group">
        <label for="historyLimit">携带历史轮数</label>
        <input type="number" id="historyLimit" placeholder="20" value="20" min="0" max="100">
        <span class="hint">设为 0 则不携带上下文</span>
      </div>

      <hr class="sidebar-hr">
      <div class="flex-row">
        <button class="btn-success flex-1" onclick="saveConfig()">保存参数</button>
        <button class="btn-outline" onclick="resetConfig()">重置</button>
      </div>
    </div>

    <!-- Prompt Management Panel -->
    <div class="side-panel hidden" id="panelPrompts">
      <div class="prompts-header">
        <button class="btn-primary btn-sm" onclick="addPrompt()">+ 新增预设</button>
        <button class="btn-outline btn-sm" onclick="showGroupManager()">分组</button>
        <button class="btn-outline btn-sm" onclick="resetAllPresets()" title="重置所有预设到初始状态">重置</button>
      </div>
      <div class="prompts-search">
        <input type="text" id="promptsSearch" placeholder="搜索预设…" oninput="renderPrompts()">
      </div>
      <div class="prompts-groups" id="promptsGroups">
        <div class="prompts-loading">加载中…</div>
      </div>
    </div>

    <!-- Search Settings Panel -->
    <div class="side-panel hidden" id="panelSearch">
      <div class="form-group">
        <label class="toggle-label" for="searchEnabled">
          <input type="checkbox" id="searchEnabled" onchange="onSearchEnabledChange(this.checked)">
          <span class="toggle-slider"></span>
          <span>启用联网搜索</span>
        </label>
      </div>
      <div class="form-group" style="margin-top:6px">
        <label for="proxyUrl">代理地址</label>
        <input type="text" id="proxyUrl" placeholder="http://localhost:3456" value="http://localhost:3456">
        <span class="hint">Node.js 搜索代理的服务地址，启动后填写</span>
      </div>
      <div class="form-group row-group" style="margin-top:6px">
        <button class="btn-primary btn-sm" onclick="testSearchProxy()">测试连接</button>
        <span id="proxyStatus" class="proxy-status"></span>
      </div>
      <hr class="sidebar-hr">
      <div class="flex-row">
        <button class="btn-success flex-1" onclick="applySearchConfigFromUI();saveSearchConfig();showToast('搜索配置已保存','success')">保存</button>
      </div>
    </div>

    <!-- Format Settings Panel -->
    <div class="side-panel hidden" id="panelFormat">
      <div class="form-group">
        <label for="formatFontSize">字号: <span id="formatFontSizeValue">16</span>px</label>
        <input type="range" id="formatFontSize" min="12" max="28" step="1" value="16"
               oninput="onFormatFontSizeChange(this.value)">
      </div>
      <div class="form-group">
        <label for="formatLineHeight">行高: <span id="formatLineHeightValue">1.85</span></label>
        <input type="range" id="formatLineHeight" min="1.0" max="2.5" step="0.1" value="1.85"
               oninput="onFormatLineHeightChange(this.value)">
      </div>
      <div class="form-group">
        <label for="formatMsgGap">消息间距: <span id="formatMsgGapValue">16</span>px</label>
        <input type="range" id="formatMsgGap" min="4" max="32" step="2" value="16"
               oninput="onFormatMsgGapChange(this.value)">
      </div>
      <div class="form-group">
        <label for="formatParaGap">段落间距: <span id="formatParaGapValue">6</span>px</label>
        <input type="range" id="formatParaGap" min="0" max="20" step="1" value="6"
               oninput="onFormatParaGapChange(this.value)">
      </div>
      <div class="form-group">
        <label class="toggle-label" for="formatIndent">
          <input type="checkbox" id="formatIndent" onchange="onFormatIndentChange(this.checked)">
          <span class="toggle-slider"></span>
          <span>首行缩进 2 字符</span>
        </label>
      </div>
      <hr class="sidebar-hr">
      <div class="flex-row">
        <button class="btn-outline flex-1" onclick="resetFormatConfig()">重置</button>
      </div>
    </div>
  </aside>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Mobile overlay backdrop -->
<div id="mobileOverlay" class="mobile-overlay" onclick="closeMobilePanels()"></div>

<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script src="js/conversations.js"></script>
<script src="js/config.js"></script>
<script src="js/prompts.js"></script>
<script src="js/search.js"></script>
<script src="js/api.js"></script>
<script src="js/init.js"></script>

</body>
</html>
